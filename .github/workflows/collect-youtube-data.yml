name: Collect YouTube Data

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: youtube-collector
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Debug trigger & branch
        run: |
          echo "event: ${{ github.event_name }}"
          echo "ref: ${{ github.ref }}"
          date -u

      - name: Checkout
        run: |
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git config core.sparseCheckout true
          echo "assets/data/2025/" >> .git/info/sparse-checkout
          echo "scripts/" >> .git/info/sparse-checkout
          git pull origin ${{ github.ref }} --depth=1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create cache directory
        run: mkdir -p cache
        
      - name: Restore etag cache
        id: etag-cache
        uses: actions/cache/restore@v3
        with:
          path: cache/
          key: youtube-etag-cache-${{ github.run_id }}
          restore-keys: |
            youtube-etag-cache-

      - name: Run script to fetch data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/collect_youtube_data.py
        
      - name: Save etag cache
        if: always()
        uses: actions/cache/save@v3
        with:
          path: cache/
          key: youtube-etag-cache-${{ github.run_id }}

      - name: Set current date as env variable
        run: echo "NOW=$(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_ENV"

      - name: Commit and push if data changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update YouTube data ${{ env.NOW }}"
